name: Windows Build
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Виправляємо попередження з твого скріншоту

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'

      - name: Build App
        run: |
          # Шукаємо будь-який .pro файл, щоб не помилитися з назвою
          $proFile = Get-ChildItem -Filter *.pro | Select-Object -First 1
          qmake $proFile.Name
          mingw32-make

      - name: Package with windeployqt
        run: |
          mkdir release_folder
          # Копіюємо EXE (шукаємо його в папці release або поточній)
          Get-ChildItem -Filter *.exe | Copy-Item -Destination release_folder/
          Get-ChildItem -Filter *.png | Copy-Item -Destination release_folder/
          # Запускаємо деплой
          $exeFile = Get-ChildItem -Path release_folder -Filter *.exe | Select-Object -First 1
          windeployqt --dir release_folder $exeFile.FullName

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Memory_Windows_App
          path: release_folder/
